<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="crossbar-grad" x1="64" y1="112" x2="136" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="node-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="line-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pink-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg-grad)"/>

  <!-- Pink ambient glow overlay -->
  <rect width="200" height="200" rx="44" fill="url(#glow-grad)"/>

  <!-- Inner border -->
  <rect x="1" y="1" width="198" height="198" rx="43" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>

  <!-- Neural-A legs -->
  <line x1="100" y1="44" x2="46" y2="148" stroke="rgba(255,255,255,0.6)" stroke-width="5" stroke-linecap="round" filter="url(#line-glow)"/>
  <line x1="100" y1="44" x2="154" y2="148" stroke="rgba(255,255,255,0.6)" stroke-width="5" stroke-linecap="round" filter="url(#line-glow)"/>

  <!-- Crossbar — pink-to-violet gradient accent -->
  <line x1="64" y1="112" x2="136" y2="112" stroke="url(#crossbar-grad)" stroke-width="4.5" stroke-linecap="round" filter="url(#line-glow)"/>

  <!-- Subtle lower edges -->
  <line x1="64" y1="112" x2="46" y2="148" stroke="rgba(255,255,255,0.15)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="136" y1="112" x2="154" y2="148" stroke="rgba(255,255,255,0.15)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top apex node — white with glow -->
  <circle cx="100" cy="44" r="11" fill="white" filter="url(#node-glow)"/>
  <circle cx="100" cy="44" r="6" fill="white"/>

  <!-- Bottom-left node -->
  <circle cx="46" cy="148" r="9.5" fill="white" filter="url(#node-glow)"/>
  <circle cx="46" cy="148" r="5" fill="white"/>

  <!-- Bottom-right node -->
  <circle cx="154" cy="148" r="9.5" fill="white" filter="url(#node-glow)"/>
  <circle cx="154" cy="148" r="5" fill="white"/>

  <!-- Crossbar-left node — pink accent -->
  <circle cx="64" cy="112" r="8" fill="#ec4899" filter="url(#pink-glow)"/>
  <circle cx="64" cy="112" r="4" fill="white"/>

  <!-- Crossbar-right node — violet accent -->
  <circle cx="136" cy="112" r="8" fill="#a78bfa" filter="url(#pink-glow)"/>
  <circle cx="136" cy="112" r="4" fill="white"/>
</svg>
